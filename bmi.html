<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BMI CALCULATOR</h1>
    <DIV id="input">
        <div id="height">Height in meter: <input type="put here" id="heightvalue"></div>
        <div id="weight">Weight in kg: <input type="put here" id="weightvalue"></div>
        <div id="calculate"><button id="calbtn">submit</button></div>
        <div id="result">The BMI: <output id="value">result</output></div>
        <h2>BMI weight guide</h2>
        <p>Under Weight=Less than 18.6</p>
        <p>Normal Range=18.6 - 24.9</p>
        <p>Overweight=Greater than 24.9</p>
        <div id="resetid"> <button id="reset">reset</button></div>
       

    </DIV>
    <script src="app.js"></script>
</body>
</html>
